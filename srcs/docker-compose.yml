services:
    nginx: # this is just a compose identifier, not the actual name of the container.
        container_name: nginx
        build: # specifies how to build a custom image from a Dockerfile.
            context: ./requirements/nginx # is the folder where Docker looks for the Dockerfile and any files referenced in it.
            dockerfile: Dockerfile # tells Docker which file to use. If my file is called Dockerfile, this line is optional.
        image: nginx:inception # name and tag of the Docker image from which the container is created.
        env_file: .env # tells Docker Compose to load environment variables from .env and inject them into the container.
        ports:
            - "443:443" # "host port : container port".
        depends_on:
            - wordpress
        networks:
            - inception
        volumes:
            - wordpress:/var/www/html
        restart: on-failure # restarts the container in case of crash.

    mariadb:
        container_name: mariadb
        build:
            context: ./requirements/mariadb
            dockerfile: Dockerfile
        image: mariadb:inception
        env_file: .env
        networks:
            - inception
        volumes:
            - db:/var/lib/mysql
        restart: on-failure

    wordpress:
        container_name: wordpress
        build:
            context: ./requirements/wordpress
            dockerfile: Dockerfile
        image: wordpress:inception
        env_file: .env
        depends_on:
            - mariadb
        networks:
           - inception
        volumes:
            - wordpress:/var/www/html
        restart: on-failure


networks:
    inception:
        driver: bridge # standard network type for internal communication.


# volumes are like files in your computer that containers can read and write. It stores data, even after containers are deleted.
# These are Docker named volumes using the local driver with bind options.
# Docker manages the volume lifecycle, while the data is stored in
# host directories (/home/login/data) as required by the subject.
volumes:
    db:
        driver: local # uses Docker’s local storage driver.
        driver_opts:
            type: none
            o: bind
            device: /home/dsteiger/data/mariadb # it will store all the database (posts, users, comments etc).

    wordpress:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/dsteiger/data/wordpress # it will store all the WordPress files (themes, plugins, uploads etc).